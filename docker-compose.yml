version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bisteca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bisteca
      POSTGRES_PASSWORD: bisteca_dev_2024
      POSTGRES_DB: bisteca
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bisteca-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
